name: openclaw-app

x-openclaw-ports: &openclaw-ports
  - "${OPENCLAW_GATEWAY_PORT:-127.0.0.1:18789}:18789"
  - "${OPENCLAW_BRIDGE_PORT:-127.0.0.1:18790}:18790"
  - "${OPENCLAW_MSTEAMS_PORT:-127.0.0.1:3978}:3978"
  - "${OPENCLAW_SSH_PORT:-127.0.0.1:2222}:22"

  - "${OPENCLAW_WEB_PORT:-127.0.0.1:3001}:3000"
  - "${OPENCLAW_VITE_PORT:-127.0.0.1:5173}:5173"
  - "${OPENCLAW_API_PORT:-127.0.0.1:8001}:8000"
  - "${OPENCLAW_ADMIN_PORT:-127.0.0.1:8081}:8080"
  - "${OPENCLAW_DEBUG_PORT:-127.0.0.1:9229}:9229"
  - "${OPENCLAW_METRICS_PORT:-127.0.0.1:9090}:9090"
  - "${OPENCLAW_OBSERVE_AGENT_PORT:-127.0.0.1:8011}:8090"
  - "${OPENCLAW_ZML_PORT:-127.0.0.1:82}:81"

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw-evr-dev:2026.5.28}
    build:
      context: .
      dockerfile: ${OPENCLAW_DOCKERFILE:-Dockerfile.openclaw-evr-dev}
    user: ${OPENCLAW_GATEWAY_RUN_USER:-0:0}
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      CODEX_HOME: /home/node/.openclaw/agents/main/agent/codex-home
      OPENCLAW_CODEX_APP_SERVER_BIN: /usr/local/bin/codex
      OPENCLAW_CODEX_APP_SERVER_APPROVAL_POLICY: never
      OPENCLAW_CODEX_APP_SERVER_SANDBOX: danger-full-access
      OPENCLAW_ENABLE_SSHD: ${OPENCLAW_ENABLE_SSHD:-1}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
      OPENCLAW_REDIS_URL: ${OPENCLAW_REDIS_URL:-redis://redis:6379/0}
      OPENCLAW_REDIS_HOST: ${OPENCLAW_REDIS_HOST:-redis}
      OPENCLAW_REDIS_PORT: ${OPENCLAW_REDIS_PORT:-6379}
      OPENCLAW_REDIS_DB: ${OPENCLAW_REDIS_DB:-0}
      OPENCLAW_REDIS_PASSWORD: ${OPENCLAW_REDIS_PASSWORD:-}
      XDG_CACHE_HOME: /home/node/.openclaw/cache
      npm_config_cache: /home/node/.openclaw/npm-cache
      PNPM_HOME: /home/node/.openclaw/pnpm
      GIT_CONFIG_GLOBAL: /home/node/.openclaw/gitconfig
      HTTP_PROXY: ${http_proxy:-}
      HTTPS_PROXY: ${https_proxy:-}
      ALL_PROXY: ${all_proxy:-}
      NO_PROXY: ${no_proxy:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      all_proxy: ${all_proxy:-}
      no_proxy: ${no_proxy:-}
      LANG: C.UTF-8
      TZ: ${OPENCLAW_TZ:-Asia/Shanghai}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${OPENCLAW_AUTH_PROFILE_SECRET_DIR}:/home/node/.config/openclaw
      - ${OPENCLAW_SSH_DIR:-/home/xcd/.openclaw-docker/ssh}:/home/node/.ssh
      - ${OPENCLAW_VSCODE_SERVER_DIR:-/home/xcd/.openclaw-docker/vscode-server}:/home/node/.vscode-server
      - ${OPENCLAW_VSCODE_CODEX_DIR:-/home/xcd/.openclaw-docker/vscode-codex}:/home/node/.codex
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports: *openclaw-ports
    init: true
    restart: unless-stopped
    command:
      [
        "openclaw",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw-evr-dev:2026.5.28}
    user: ${OPENCLAW_RUN_USER:-1002:1002}
    network_mode: "service:openclaw-gateway"
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      CODEX_HOME: /home/node/.openclaw/agents/main/agent/codex-home
      OPENCLAW_CODEX_APP_SERVER_BIN: /usr/local/bin/codex
      OPENCLAW_CODEX_APP_SERVER_APPROVAL_POLICY: never
      OPENCLAW_CODEX_APP_SERVER_SANDBOX: danger-full-access
      OPENCLAW_ENABLE_SSHD: "0"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      OPENCLAW_REDIS_URL: ${OPENCLAW_REDIS_URL:-redis://redis:6379/0}
      OPENCLAW_REDIS_HOST: ${OPENCLAW_REDIS_HOST:-redis}
      OPENCLAW_REDIS_PORT: ${OPENCLAW_REDIS_PORT:-6379}
      OPENCLAW_REDIS_DB: ${OPENCLAW_REDIS_DB:-0}
      OPENCLAW_REDIS_PASSWORD: ${OPENCLAW_REDIS_PASSWORD:-}
      BROWSER: echo
      XDG_CACHE_HOME: /home/node/.openclaw/cache
      npm_config_cache: /home/node/.openclaw/npm-cache
      PNPM_HOME: /home/node/.openclaw/pnpm
      GIT_CONFIG_GLOBAL: /home/node/.openclaw/gitconfig
      HTTP_PROXY: ${http_proxy:-}
      HTTPS_PROXY: ${https_proxy:-}
      ALL_PROXY: ${all_proxy:-}
      NO_PROXY: ${no_proxy:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      all_proxy: ${all_proxy:-}
      no_proxy: ${no_proxy:-}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${OPENCLAW_AUTH_PROFILE_SECRET_DIR}:/home/node/.config/openclaw
      - ${OPENCLAW_SSH_DIR:-/home/xcd/.openclaw-docker/ssh}:/home/node/.ssh
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["openclaw"]
    depends_on:
      - openclaw-gateway

networks:
  default:
    external: true
    name: openclaw-shared
