name: openclaw-middleware

services:
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
      - -c
      - listen_addresses=*
    environment:
      POSTGRES_DB: ${OPENCLAW_POSTGRES_DB:-openclaw}
      POSTGRES_USER: ${OPENCLAW_POSTGRES_USER:-openclaw}
      POSTGRES_PASSWORD: ${OPENCLAW_POSTGRES_PASSWORD:-openclaw}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${OPENCLAW_TZ}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
    ports:
      - "${OPENCLAW_POSTGRES_PORT:-127.0.0.1:5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    init: true

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    env_file:
      - ./minio/minio.env
    environment:
      TZ: ${OPENCLAW_TZ}
    volumes:
      - ./minio/data:/data
      - ./minio/config:/root/.minio
    ports:
      - "${OPENCLAW_MINIO_API_PORT:-127.0.0.1:9010}:9000"
      - "${OPENCLAW_MINIO_CONSOLE_PORT:-127.0.0.1:9011}:9001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    init: true

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: ${OPENCLAW_RABBITMQ_USER:-openclaw}
      RABBITMQ_DEFAULT_PASS: ${OPENCLAW_RABBITMQ_PASSWORD:-openclaw-rabbitmq}
      RABBITMQ_DEFAULT_VHOST: ${OPENCLAW_RABBITMQ_VHOST:-/openclaw}
      TZ: ${OPENCLAW_TZ}
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq
      - ./rabbitmq/conf.d/10-defaults.conf:/etc/rabbitmq/conf.d/10-defaults.conf
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    ports:
      - "${OPENCLAW_RABBITMQ_PORT:-127.0.0.1:5672}:5672"
      - "${OPENCLAW_RABBITMQ_MANAGEMENT_PORT:-127.0.0.1:15672}:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    init: true

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    environment:
      TZ: ${OPENCLAW_TZ}
    volumes:
      - ./redis/data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    init: true

  zlmediakit:
    image: zlmediakit/zlmediakit:master
    environment:
      TZ: ${OPENCLAW_TZ}
    volumes:
      - ./zlmediakit/config.ini:/opt/media/conf/config.ini
    ports:
      - "${OPENCLAW_ZLM_RTMP_PORT:-127.0.0.1:1945}:1935"
      - "${OPENCLAW_ZLM_HTTP_PORT:-127.0.0.1:8082}:80"
      - "${OPENCLAW_ZLM_HTTPS_PORT:-127.0.0.1:8443}:443"
      - "${OPENCLAW_ZLM_RTSP_PORT:-127.0.0.1:8555}:554"
      - "${OPENCLAW_ZLM_SRT_PORT:-127.0.0.1:10005}:10000"
      - "${OPENCLAW_ZLM_SRT_PORT:-127.0.0.1:10005}:10000/udp"
      - "${OPENCLAW_ZLM_UDP_PORT:-127.0.0.1:8002}:8000/udp"
      - "${OPENCLAW_ZLM_UDP_PORT_2:-127.0.0.1:9000}:9000/udp"
    restart: unless-stopped
    init: true

networks:
  default:
    external: true
    name: openclaw-shared
